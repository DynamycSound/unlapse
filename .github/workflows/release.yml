name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Test
        run: go test ./...
      - name: Build binaries
        run: ./scripts/build-release.sh "${GITHUB_REF_NAME}"
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/unlapse-*
            dist/SHA256SUMS.txt
          generate_release_notes: true
