<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b2032"/>
      <stop offset="1" stop-color="#10131f"/>
    </linearGradient>
    <linearGradient id="sand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <rect x="4" y="4" width="120" height="120" rx="24" fill="none" stroke="#f59e0b" stroke-opacity="0.25" stroke-width="2"/>
  <!-- hourglass frame -->
  <path d="M40 30h48M40 98h48" stroke="#e7ecf5" stroke-width="7" stroke-linecap="round"/>
  <path d="M46 34c0 16 10 22 18 30-8 8-18 14-18 30M82 34c0 16-10 22-18 30 8 8 18 14 18 30"
        fill="none" stroke="#e7ecf5" stroke-width="5.5" stroke-linecap="round"/>
  <!-- sand: top almost empty, bottom full -->
  <path d="M57 50c2 5 4.5 7.5 7 10 2.5-2.5 5-5 7-10z" fill="url(#sand)"/>
  <path d="M50 92c0-10 8-15 14-20 6 5 14 10 14 20z" fill="url(#sand)"/>
  <!-- falling grain -->
  <circle cx="64" cy="68" r="2.4" fill="#fbbf24"/>
  <circle cx="64" cy="77" r="2" fill="#fbbf24" opacity="0.7"/>
</svg>
